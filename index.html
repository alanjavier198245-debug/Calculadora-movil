<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Científica</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    background:#2b2b2b;
}

.calculadora{
    width:100vw;
    height:100vh;
    background:#3a3a3a;
    display:flex;
    flex-direction:column;
    padding:10px;
}

#pantalla{
    width:100%;
    height:15vh;
    border:none;
    background:#1f1f1f;
    color:white;
    text-align:right;
    font-size:3rem;
    padding:20px;
    border-radius:10px;
    margin-bottom:10px;
}

.toggle{
    width:100%;
    height:7vh;
    border:none;
    border-radius:10px;
    background:#6e6e6e;
    color:white;
    font-size:1.1rem;
    margin-bottom:10px;
}

.cientifica{
    display:none;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    margin-bottom:10px;
}

.botones{
    flex:1;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
}

button{
    border:none;
    border-radius:12px;
    background:#c0c0c0;
    font-size:1.8rem;
    font-weight:bold;
}

button:active{
    transform:scale(0.95);
}

.operador{
    background:#9c9c9c;
}

.igual{
    background:#5f5f5f;
    color:white;
}
.igual:hover{
    background:#777;
}

.cientifica{
    margin-top:10px;
    display:none;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.toggle{
    width:100%;
    margin-bottom:10px;
    background:#6e6e6e;
    color:white;
}
</style>
</head>
<body>

<div class="calculadora">

    <input type="text" id="pantalla" readonly>

    <button class="toggle" onclick="toggleCientifica()">
        Activar / Desactivar Científica
    </button>

    <div class="cientifica" id="cientifica">
        <button onclick="agregar('Math.sin(')">sin</button>
        <button onclick="agregar('Math.cos(')">cos</button>
        <button onclick="agregar('Math.tan(')">tan</button>
        <button onclick="agregar('Math.sqrt(')">√</button>

        <button onclick="agregar('Math.log10(')">log</button>
        <button onclick="agregar('Math.log(')">ln</button>
        <button onclick="agregar('Math.PI')">π</button>
        <button onclick="agregar('Math.E')">e</button>

        <button onclick="agregar('**')">xʸ</button>
        <button onclick="agregar('(')">(</button>
        <button onclick="agregar(')')">)</button>
        <button onclick="agregar('%')">%</button>
    </div>

    <div class="botones">
        <button onclick="limpiar()">C</button>
        <button onclick="borrar()">⌫</button>
        <button onclick="agregar('/')">÷</button>
        <button class="operador" onclick="agregar('*')">×</button>

        <button onclick="agregar('7')">7</button>
        <button onclick="agregar('8')">8</button>
        <button onclick="agregar('9')">9</button>
        <button class="operador" onclick="agregar('-')">−</button>

        <button onclick="agregar('4')">4</button>
        <button onclick="agregar('5')">5</button>
        <button onclick="agregar('6')">6</button>
        <button class="operador" onclick="agregar('+')">+</button>

        <button onclick="agregar('1')">1</button>
        <button onclick="agregar('2')">2</button>
        <button onclick="agregar('3')">3</button>
        <button class="igual" onclick="calcular()">=</button>

        <button onclick="agregar('0')">0</button>
        <button onclick="agregar('.')">.</button>
    </div>

</div>

<script>
const pantalla = document.getElementById("pantalla");

function agregar(valor){
    pantalla.value += valor;
}

function limpiar(){
    pantalla.value = "";
}

function borrar(){
    pantalla.value = pantalla.value.slice(0,-1);
}

function calcular(){
    try{
        pantalla.value = eval(pantalla.value);
    }catch{
        pantalla.value = "Error";
    }
}

function toggleCientifica(){
    const panel = document.getElementById("cientifica");

    if(panel.style.display === "grid"){
        panel.style.display = "none";
    }else{
        panel.style.display = "grid";
    }
}
</script>

</body>
</html>
